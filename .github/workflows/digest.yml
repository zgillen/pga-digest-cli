name: Daily PGA Digest

on:
  schedule:
    - cron: "0 13 * * *"  # 9am Eastern (UTC-4 in EDT)
  workflow_dispatch:
    inputs:
      mode:
        description: "Override mode (blank = auto by day)"
        required: false
        type: choice
        options:
          - ""
          - recap
          - preview
          - preview_bets
          - leaderboard
        default: ""
      dry_run:
        description: "Show raw data only, no email"
        required: false
        type: boolean
        default: false

jobs:
  send-digest:
    runs-on: ubuntu-latest
    environment: digest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Send digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATAGOLF_API_KEY: ${{ secrets.DATAGOLF_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ inputs.mode }}" ]; then
            ARGS="$ARGS --mode ${{ inputs.mode }}"
          fi
          pga-digest $ARGS
